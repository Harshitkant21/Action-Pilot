version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: actionpilot-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: actionpilotdb
      POSTGRES_PASSWORD: actionpilotdbpassword
      POSTGRES_DB: actionpilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: