version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: actionpilot-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: actionpilot-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: